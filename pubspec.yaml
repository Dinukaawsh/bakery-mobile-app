name: bakery_mobile
description: Flutter mobile client for the Bakery delivery platform.
publish_to: "none"
version: 1.0.10+11

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  geolocator: ^13.0.2
  http: ^1.2.2
  http_parser: ^4.1.2
  image_picker: ^1.2.3
  intl: ^0.20.2
  pdf: ^3.11.3
  printing: ^5.14.2
  shared_preferences: ^2.3.3
  table_calendar: ^3.2.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#B45309"
  adaptive_icon_foreground: assets/icon/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/icon/app_icon.png
    - assets/fonts/NotoSansSinhala-Regular.ttf
    - assets/fonts/NotoSansSinhala-Bold.ttf
  fonts:
    - family: NotoSansSinhala
      fonts:
        - asset: assets/fonts/NotoSansSinhala-Regular.ttf
        - asset: assets/fonts/NotoSansSinhala-Bold.ttf
          weight: 700
